---
- name: Setup Monitoring (Prometheus & Grafana) using Helm
  hosts: kubernetes
  become: yes

  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Download Helm install script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0700'

    - name: Install Helm
      command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Add Prometheus-Community Helm repository
      command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts

    - name: Update Helm repositories
      command: helm repo update

    - name: Install kube-prometheus-stack (Prometheus + Grafana)
      command: >
        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack
        --namespace monitoring --create-namespace
        --set grafana.service.type=NodePort
        --set grafana.service.nodePort=30300

    - name: Wait for Grafana to be deployed
      pause:
        seconds: 30

    - name: Get grafana password
      shell: sudo k3s kubectl get secret monitoring-grafana -n monitoring -o jsonpath="{.data.admin-password}" | base64 --decode
      changed_when: false
      register: grafanaresult

    - name: Password to "Unlock grafana"
      debug:
        var: grafanaresult.stdout