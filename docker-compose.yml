version: '3.8'

services:
  # 1. Frontend Service
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  # 2. Backend Service
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/devopsdb
    depends_on:
      - database
    networks:
      - app-network

  # 3. Database Service
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

# تعريف شبكة داخلية لكي تتواصل الحاويات مع بعضها
networks:
  app-network:
    driver: bridge

# تعريف مساحة تخزين دائمة لقاعدة البيانات (حتى لا تُفقد البيانات عند إيقاف الحاوية)
volumes:
  mongo-data: